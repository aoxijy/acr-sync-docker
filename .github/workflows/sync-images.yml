name: Auto-Sync Docker Hub Images to ACR (only when updated)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # 防止一个镜像失败导致其他镜像被取消
      matrix:
        image:
          - dockerhub: pgvector/pgvector:pg16
            acr_repo: pgvector:pg16
            namespace: jgyu
          - dockerhub: xream/sub-store:latest
            acr_repo: sub-store:latest
            namespace: jgyu
          - dockerhub: btpanel/baota:lnmp
            acr_repo: baota:lnmp
            namespace: jgyu
          - dockerhub: aoxijy/sub-web:2.5
            acr_repo: sub-web:2.5
            namespace: jgyu
          - dockerhub: tindy2013/subconverter:latest
            acr_repo: subconverter:latest
            namespace: jgyu
          - dockerhub: sigoden/dufs:v0.41.0
            acr_repo: dufs:v0.41.0
            namespace: jgyu

    steps:
      - name: Login to Alibaba Cloud ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin "${{ secrets.ACR_REGISTRY }}"

      - name: Login to Docker Hub (using provided secrets)
        # 现在您已添加这两个 secret，直接登录即可
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin

      - name: Check and Sync ${{ matrix.image.dockerhub }}
        id: sync
        run: |
          set -euo pipefail
          DOCKERHUB_IMAGE="${{ matrix.image.dockerhub }}"
          ACR_REPO="${{ matrix.image.acr_repo }}"
          NAMESPACE="${{ matrix.image.namespace }}"
          ACR_IMAGE="${{ secrets.ACR_REGISTRY }}/${NAMESPACE}/${ACR_REPO}"

          # 使用 docker buildx imagetools 获取 Docker Hub digest（此时已登录，稳定可靠）
          echo "Inspecting Docker Hub image: $DOCKERHUB_IMAGE"
          DH_DIGEST=""
          if ! DH_DIGEST=$(docker buildx imagetools inspect "$DOCKERHUB_IMAGE" --format '{{json .}}' 2>/dev/null | jq -r '.manifest.digest // .config.digest'); then
            echo "⚠️ Failed to get digest from Docker Hub, will attempt to sync anyway."
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "acr_image=$ACR_IMAGE" >> $GITHUB_OUTPUT
            echo "dockerhub_image=$DOCKERHUB_IMAGE" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Docker Hub digest: $DH_DIGEST"

          # 获取 ACR 中现有镜像的 digest
          ACR_DIGEST=""
          if ! ACR_DIGEST=$(docker buildx imagetools inspect "$ACR_IMAGE" --format '{{json .}}' 2>/dev/null | jq -r '.manifest.digest // .config.digest'); then
            echo "⚠️ ACR image not found or inaccessible, will sync."
          else
            echo "ACR digest: $ACR_DIGEST"
          fi

          # 比较 digest
          if [ -n "$ACR_DIGEST" ] && [ "$DH_DIGEST" = "$ACR_DIGEST" ]; then
            echo "✅ Digest unchanged, no need to sync."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "🔄 Digest changed or ACR missing, will sync."
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "acr_image=$ACR_IMAGE" >> $GITHUB_OUTPUT
            echo "dockerhub_image=$DOCKERHUB_IMAGE" >> $GITHUB_OUTPUT
          fi

      - name: Pull, Tag, and Push (only if changed)
        if: steps.sync.outputs.changed == 'true'
        run: |
          ACR_IMAGE="${{ steps.sync.outputs.acr_image }}"
          DOCKERHUB_IMAGE="${{ steps.sync.outputs.dockerhub_image }}"

          echo "Pulling $DOCKERHUB_IMAGE..."
          docker pull "$DOCKERHUB_IMAGE"

          echo "Tagging as $ACR_IMAGE..."
          docker tag "$DOCKERHUB_IMAGE" "$ACR_IMAGE"

          echo "Pushing $ACR_IMAGE..."
          docker push "$ACR_IMAGE"
