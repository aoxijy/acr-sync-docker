name: Sync Docker Hub Images to Alibaba Cloud ACR

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          # 公开命名空间 jgyu 的镜像
          - dockerhub: pgvector/pgvector:pg16
            acr_repo: pgvector:pg16
            namespace: jgyu          # 指定命名空间
          - dockerhub: xream/sub-store:latest
            acr_repo: sub-store:latest
            namespace: jgyu
          - dockerhub: aoxijy/sub-web:2.5
            acr_repo: sub-web:2.5
            namespace: jgyu
          - dockerhub: tindy2013/subconverter:latest
            acr_repo: subconverter:latest
            namespace: jgyu
          - dockerhub: sigoden/dufs:v0.41.0
            acr_repo: dufs:v0.41.0
            namespace: jgyu
          # 私有命名空间 gqru 的镜像（示例）
          # - dockerhub: odoo:19.0
          #   acr_repo: odoo:19.0
          #   namespace: gqru          # 如果不写 namespace，则使用 secrets.ACR_NAMESPACE

    steps:
      - name: Login to Alibaba Cloud ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin "${{ secrets.ACR_REGISTRY }}"

      - name: Pull, Tag, and Push ${{ matrix.image.dockerhub }}
        run: |
          DOCKERHUB_IMAGE="${{ matrix.image.dockerhub }}"
          ACR_REPO="${{ matrix.image.acr_repo }}"
          NAMESPACE="${{ matrix.image.namespace || secrets.ACR_NAMESPACE }}"
          ACR_IMAGE="${{ secrets.ACR_REGISTRY }}/${NAMESPACE}/${ACR_REPO}"

          echo "Pulling $DOCKERHUB_IMAGE..."
          docker pull "$DOCKERHUB_IMAGE"

          echo "Tagging as $ACR_IMAGE..."
          docker tag "$DOCKERHUB_IMAGE" "$ACR_IMAGE"

          echo "Pushing $ACR_IMAGE..."
          docker push "$ACR_IMAGE"
